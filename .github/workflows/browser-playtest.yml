name: Browser Playtest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  ui-agents:
    name: UI agents
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run UI playtest agents
        run: npm run test:ui-agents

      - name: Upload playtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playtest-agents
          path: artifacts/playtests/
          if-no-files-found: ignore

  character-runtime:
    name: Character runtime
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run character runtime browser check
        run: npm run test:character-browser

      - name: Upload character runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: character-runtime-browser
          path: artifacts/playtests/
          if-no-files-found: ignore
